<button class="volver" routerLink="/catalogo">
  ← Volver al catálogo
</button>

<div *ngIf="producto; else noExiste" class="detalle-container">
  
  <div class="detalle-card premium-card">
    <div class="card-glow"></div>
    <div class="card-content detalle-layout">
      
      <div class="imagen img-wrapper">
        <img [src]="producto.imagen" alt="producto">
      </div>

      <div class="info">
        <h2>{{ producto.nombre }}</h2>
        <p class="precio">{{ producto.precio | currency }}</p>

        <div class="descripcion-box">
          <p class="descripcion">{{ producto.descripcion }}</p>
        </div>

        <p *ngIf="producto.disponible; else agotado" class="disponible status">
          Disponible
        </p>
        <ng-template #agotado>
          <p class="no-disponible status">Agotado</p>
        </ng-template>

        <button *ngIf="producto.disponible" class="btn-primary btn-large">
          Agregar al carrito
        </button>
      </div>

    </div>
  </div>

</div>

<ng-template #noExiste>
  <div class="error-box">
    <p class="error">404 - Producto no encontrado</p>
  </div>
</ng-template>
