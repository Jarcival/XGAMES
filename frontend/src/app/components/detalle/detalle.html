<button class="volver" routerLink="/catalogo">← Volver al catálogo</button>

@if (producto()) {
  <div class="detalle-container">
    <div class="detalle-card">
      <div class="detalle-layout">

        <div class="img-wrapper">
          <img [src]="producto().imagen" alt="{{ producto().nombre }}">
        </div>

        <div class="info">
          <h2>{{ producto().nombre }}</h2>
          <p class="marca-cat">{{ producto().marca }} · {{ producto().categoria }}</p>
          <p class="precio">{{ producto().precio | currency:'MXN':'symbol-narrow' }}</p>

          <div class="descripcion-box">
            <p class="descripcion">{{ producto().descripcion }}</p>
          </div>

          @if (producto().disponible) {
            <p class="disponible status">✔ Disponible</p>
            <button class="btn-agregar">Agregar al carrito</button>
          } @else {
            <p class="no-disponible status">✘ Agotado</p>
          }
        </div>

      </div>
    </div>
  </div>
} @else {
  <div class="error-box">
    <p class="error">Cargando producto...</p>
  </div>
}
